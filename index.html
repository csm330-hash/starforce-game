<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STARFORCE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#020510;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Orbitron',monospace;
    overflow:hidden; touch-action:none;
  }
  #game-wrapper { position:relative; display:flex; flex-direction:column; align-items:center; }
  #hud {
    width:480px; display:flex; justify-content:space-between; align-items:center;
    padding:8px 14px;
    background:rgba(0,255,245,0.04);
    border:1px solid rgba(0,255,245,0.2); border-bottom:none;
  }
  .hud-label { font-size:9px; color:rgba(0,255,245,0.45); letter-spacing:2px; margin-bottom:2px; }
  .hud-value { font-family:'Share Tech Mono',monospace; font-size:18px; color:#00fff5; text-shadow:0 0 8px #00fff5; }
  #lives-display { display:flex; gap:6px; align-items:center; }
  .life-ship {
    width:16px; height:18px; background:#00fff5;
    clip-path:polygon(50% 0%,100% 100%,75% 80%,50% 90%,25% 80%,0% 100%);
    box-shadow:0 0 6px #00fff5; transition:opacity 0.3s;
  }
  .life-ship.dead { opacity:0.12; }
  canvas { display:block; border-left:1px solid rgba(0,255,245,0.2); border-right:1px solid rgba(0,255,245,0.2); }
  #bottom-bar {
    width:480px; display:flex; justify-content:space-between; align-items:center;
    padding:5px 14px;
    background:rgba(0,255,245,0.04);
    border:1px solid rgba(0,255,245,0.2); border-top:none;
  }
  .wave-badge { font-size:10px; color:#ffe600; letter-spacing:3px; text-shadow:0 0 8px #ffe600; }
  .hint { font-family:'Share Tech Mono',monospace; font-size:9px; color:rgba(255,255,255,0.25); letter-spacing:1px; }

  /* Overlay */
  #overlay {
    position:absolute; top:37px; left:0;
    width:480px; height:640px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(2,5,16,0.93); z-index:10; gap:14px;
  }
  .ov-title { font-size:44px; font-weight:900; letter-spacing:6px; color:#00fff5; text-shadow:0 0 30px #00fff5; }
  .ov-sub { font-size:11px; letter-spacing:4px; color:rgba(0,255,245,0.45); }
  .ov-label { font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.35); margin-bottom:-8px; }
  .ov-score { font-family:'Share Tech Mono',monospace; font-size:32px; color:#ffe600; text-shadow:0 0 20px #ffe600; }
  .ov-wave { font-family:'Share Tech Mono',monospace; font-size:13px; color:#ffe600; letter-spacing:3px; }
  .start-btn {
    margin-top:8px; padding:12px 44px;
    background:transparent; border:2px solid #ff2d78;
    color:#ff2d78; font-family:'Orbitron',monospace;
    font-size:13px; font-weight:700; letter-spacing:4px;
    cursor:pointer; text-shadow:0 0 10px #ff2d78;
    box-shadow:0 0 20px rgba(255,45,120,0.25); transition:all 0.15s; border-radius:2px;
  }
  .start-btn:hover, .start-btn:active { background:rgba(255,45,120,0.15); }

  /* ── 모바일 컨트롤 ── */
  #mobile-controls {
    display:none;
    width:480px;
    padding:10px 14px 6px;
    gap:10px;
    align-items:center;
    justify-content:space-between;
  }
  .mob-side { display:flex; gap:8px; }
  .mob-btn {
    width:72px; height:72px;
    background:rgba(0,255,245,0.07);
    border:1.5px solid rgba(0,255,245,0.35);
    color:#00fff5; font-size:26px;
    cursor:pointer; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    user-select:none; touch-action:none;
    transition:background 0.1s;
  }
  .mob-btn:active, .mob-btn.pressed { background:rgba(0,255,245,0.22); }
  #fire-btn {
    width:88px; height:72px;
    background:rgba(255,45,120,0.08);
    border-color:rgba(255,45,120,0.45); color:#ff2d78;
    font-family:'Orbitron',monospace; font-size:12px; font-weight:700; letter-spacing:1px;
    border-radius:12px;
  }
  #fire-btn.pressed { background:rgba(255,45,120,0.22); }
  .mob-label {
    font-family:'Share Tech Mono',monospace;
    font-size:8px; color:rgba(255,255,255,0.2);
    letter-spacing:1px; text-align:center; margin-top:4px;
  }

  @media(max-width:520px){
    #hud,canvas,#bottom-bar,#mobile-controls { width:100vw; max-width:480px; }
    #overlay { width:100vw; max-width:480px; height:60vw; min-height:320px; top:37px; }
    canvas { width:100vw!important; max-width:480px!important; height:auto!important; }
    #mobile-controls { display:flex; }
    .ov-title { font-size:28px; }
    .mob-btn { width:64px; height:64px; font-size:22px; }
    #fire-btn { width:80px; height:64px; }
  }
  @media(min-width:521px) and (max-height:750px){
    #mobile-controls { display:flex; }
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div>
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="score-display">000000</div>
    </div>
    <div style="text-align:center">
      <div class="hud-label">BEST</div>
      <div class="hud-value" id="best-display">000000</div>
    </div>
    <div style="text-align:right">
      <div class="hud-label">LIVES</div>
      <div id="lives-display">
        <div class="life-ship" id="life0"></div>
        <div class="life-ship" id="life1"></div>
        <div class="life-ship" id="life2"></div>
      </div>
    </div>
  </div>
  <canvas id="canvas" width="480" height="640"></canvas>
  <div id="bottom-bar">
    <div class="wave-badge" id="wave-badge">WAVE 01</div>
    <div class="hint" id="ctrl-hint">← → MOVE &nbsp;|&nbsp; SPACE FIRE &nbsp;|&nbsp; ESC 정지</div>
  </div>
  <div id="overlay">
    <div class="ov-title" id="ov-title">STARFORCE</div>
    <div class="ov-sub">은하 수비대</div>
    <div class="ov-wave" id="ov-wave"></div>
    <div class="ov-label" id="ov-label"></div>
    <div class="ov-score" id="ov-score"></div>
    <button class="start-btn" id="start-btn" onclick="startGame()">▶ START</button>
  </div>
</div>

<!-- 모바일 버튼: 좌우이동 + 자동발사 토글 -->
<div id="mobile-controls">
  <!-- 왼손: 일시정지 + 발사 -->
  <div class="mob-side">
    <div>
      <button class="mob-btn" id="pause-btn" onclick="togglePause()" style="font-size:13px;letter-spacing:1px;color:#ffe600;border-color:rgba(255,230,0,0.4);background:rgba(255,230,0,0.06);">⏸<br><span style="font-size:9px">정지</span></button>
    </div>
    <div>
      <button class="mob-btn" id="fire-btn">FIRE</button>
      <div class="mob-label">꾹=연사</div>
    </div>
  </div>
  <!-- 오른손: 좌우 이동 -->
  <div class="mob-side">
    <div>
      <button class="mob-btn" id="left-btn">◀</button>
      <div class="mob-label">LEFT</div>
    </div>
    <div>
      <button class="mob-btn" id="right-btn">▶</button>
      <div class="mob-label">RIGHT</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;

// ── 터치 감지 ──
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isMobile) {
  document.getElementById('mobile-controls').style.display = 'flex';
  document.getElementById('ctrl-hint').textContent = '버튼으로 조작';
}

// ── State ──
let gameState = 'idle';
let score = 0, bestScore = 0, lives = 3, wave = 1;
let rafId = null;
let paused = false;

function togglePause() {
  if(gameState !== 'playing') return;
  paused = !paused;
  if(paused) {
    document.getElementById('ov-title').textContent = 'PAUSED';
    document.getElementById('ov-wave').textContent = '일시정지';
    document.getElementById('ov-label').textContent = '';
    document.getElementById('ov-score').textContent = '';
    document.getElementById('start-btn').textContent = '▶ RESUME';
    document.getElementById('start-btn').onclick = resumeGame;
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('overlay').style.display = 'flex';
  } else {
    resumeGame();
  }
}

function resumeGame() {
  paused = false;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('start-btn').onclick = startGame;
}

// ── Input ──
const keys = {};
document.addEventListener('keydown', e => {
  if(e.code==='Escape') { togglePause(); return; }
  keys[e.code]=true;
  if(e.code==='Space') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code]=false; });

// 모바일 버튼
function bindBtn(id, code) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[code]=true;  el.classList.add('pressed'); }, {passive:false});
  el.addEventListener('touchend',   e => { e.preventDefault(); keys[code]=false; el.classList.remove('pressed'); }, {passive:false});
  el.addEventListener('touchcancel',e => { keys[code]=false; el.classList.remove('pressed'); });
  // 마우스로도 작동 (PC에서 테스트용)
  el.addEventListener('mousedown', () => { keys[code]=true;  el.classList.add('pressed'); });
  el.addEventListener('mouseup',   () => { keys[code]=false; el.classList.remove('pressed'); });
  el.addEventListener('mouseleave',() => { keys[code]=false; el.classList.remove('pressed'); });
}
bindBtn('left-btn',  'ArrowLeft');
bindBtn('right-btn', 'ArrowRight');
bindBtn('fire-btn',  'Space');

// ── Stars ──
const stars = Array.from({length:130}, () => ({
  x:Math.random()*W, y:Math.random()*H,
  speed:0.4+Math.random()*1.3, size:0.4+Math.random()*1.5, a:0.2+Math.random()*0.7
}));

// ── Player ──
let px=W/2, py=H-70, pCool=0, pInv=0;
const PW=36, PH=36, PSPEED=5;

// ── Game objects ──
let pBullets=[], eBullets=[], enemies=[], parts=[], exps=[];
let fmX=0, fmDir=1, fmY=0;

// ── 적 설정 (느린 버전) ──
const ETYPES = {
  grunt:  {w:30,h:28,hp:1,pts:100, col:'#ff2d78', fr:0.0005},
  medium: {w:34,h:32,hp:2,pts:250, col:'#ffe600', fr:0.0009},
  boss:   {w:44,h:40,hp:5,pts:800, col:'#b44dff', fr:0.0014}
};

function buildWave(n) {
  enemies=[]; fmX=0; fmDir=1; fmY=0;
  const cols=8, rows=Math.min(2+n,5);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      let t='grunt';
      if(r===0&&n>=3) t='boss';
      else if(r<=1&&n>=2) t='medium';
      const T=ETYPES[t];
      const ox=56+c*52, oy=50+r*52;
      enemies.push({ox,oy,x:ox,y:oy,w:T.w,h:T.h,
        hp:T.hp,maxHp:T.hp,pts:T.pts,col:T.col,t,
        fr:T.fr*(1+(n-1)*0.07),
        alive:true,flash:0,pulse:Math.random()*Math.PI*2,
        diving:false,diveT:0});
    }
  }
}

function boom(x,y,col,big) {
  const n=big?22:10;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2, sp=big?1+Math.random()*3.5:0.5+Math.random()*2;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:big?40+Math.random()*20:18+Math.random()*12,
      maxLife:big?60:30, sz:big?2+Math.random()*2.5:1+Math.random()*1.5, col});
  }
  exps.push({x,y,r:0,maxR:big?48:22,life:12,col});
}

// ── Update ──
function update(dt=1) {
  if(gameState!=='playing' || paused) return;

  // 플레이어 이동
  if(keys['ArrowLeft']  && px-PW/2>0) px-=PSPEED*dt;
  if(keys['ArrowRight'] && px+PW/2<W) px+=PSPEED*dt;

  // 플레이어 발사
  if(pCool>0) pCool-=dt;
  if((keys['Space']||keys['KeyZ'])&&pCool<=0){
    pBullets.push({x:px,y:py-20,vy:-11,w:3,h:14});
    pCool=14;
  }
  if(pInv>0) pInv-=dt;

  // 편대 이동
  fmX+=fmDir*(0.25+wave*0.03)*dt;
  if(fmX>25||fmX<-25) fmDir*=-1;

  let liveCount=0;
  for(const e of enemies){
    if(!e.alive) continue;
    liveCount++;
    e.pulse+=0.05*dt;
    if(e.flash>0) e.flash-=dt;

    if(!e.diving){
      e.x=e.ox+fmX; e.y=e.oy+fmY;
      if(Math.random()<0.00007*wave*dt){ e.diving=true; e.diveT=0; }
    } else {
      e.diveT+=0.035*dt;
      e.y+=(1.5+wave*0.12)*dt;
      e.x+=Math.sin(e.diveT)*2.5*dt;
      if(e.y>H+50){
        e.diving=false; e.diveT=0;
        e.oy=-50; e.ox=56+Math.floor(Math.random()*8)*52;
        const cap=e;
        setTimeout(()=>{ if(cap.alive){ cap.oy=50+Math.floor(Math.random()*3)*52; } },700);
      }
    }

    // 적 발사
    if(Math.random()<e.fr*dt){
      const cx=e.x+e.w/2, cy=e.y+e.h;
      const dx=px-cx, dy=py-cy, d=Math.sqrt(dx*dx+dy*dy)||1;
      const sp=1.4+wave*0.07;
      eBullets.push({x:cx,y:cy,vx:(dx/d)*sp*0.25,vy:sp,col:e.col});
    }

    // 플레이어 총알 vs 적
    for(let i=pBullets.length-1;i>=0;i--){
      const b=pBullets[i];
      if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
        e.hp--; e.flash=5;
        boom(b.x,b.y,e.col,false);
        pBullets.splice(i,1);
        if(e.hp<=0){ e.alive=false; score+=e.pts; boom(e.x+e.w/2,e.y+e.h/2,e.col,true); refreshScore(); }
        break;
      }
    }

    // 적 몸통 vs 플레이어
    if(pInv<=0&&px+PW/2-8>e.x&&px-PW/2+8<e.x+e.w&&py+PH/2-8>e.y&&py-PH/2+8<e.y+e.h){
      e.alive=false; boom(e.x+e.w/2,e.y+e.h/2,e.col,true); hitPlayer();
    }
  }

  // 플레이어 총알 이동
  pBullets=pBullets.filter(b=>{ b.y+=b.vy*dt; return b.y>-20; });

  // 적 총알 이동
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i]; b.x+=b.vx*dt; b.y+=b.vy*dt;
    if(b.y>H+10||b.x<0||b.x>W){ eBullets.splice(i,1); continue; }
    if(pInv<=0&&b.x>px-PW/2+8&&b.x<px+PW/2-8&&b.y>py-PH/2+8&&b.y<py+PH/2-8){
      eBullets.splice(i,1); hitPlayer();
    }
  }

  // 파티클
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.05*dt; p.life-=dt;
    if(p.life<=0) parts.splice(i,1);
  }
  for(let i=exps.length-1;i>=0;i--){
    const e=exps[i]; e.r+=e.maxR/8*dt; e.life-=dt;
    if(e.life<=0) exps.splice(i,1);
  }

  // 별 이동
  for(const s of stars){ s.y+=s.speed*dt; if(s.y>H){ s.y=0; s.x=Math.random()*W; } }

  // 웨이브 클리어
  if(liveCount===0&&gameState==='playing'){
    gameState='waveclear';
    wave++;
    document.getElementById('wave-badge').textContent='WAVE '+String(wave).padStart(2,'0');
    document.getElementById('ov-title').textContent='WAVE CLEAR';
    document.getElementById('ov-wave').textContent='★  WAVE '+(wave-1)+' 클리어!  ★';
    document.getElementById('ov-label').textContent='';
    document.getElementById('ov-score').textContent='';
    document.getElementById('start-btn').style.display='none';
    document.getElementById('overlay').style.display='flex';
    setTimeout(()=>{
      pBullets=[]; eBullets=[]; parts=[]; exps=[];
      buildWave(wave);
      document.getElementById('overlay').style.display='none';
      gameState='playing';
    },1800);
  }
}

function hitPlayer(){
  if(pInv>0) return;
  boom(px,py,'#00fff5',true);
  lives--; refreshLives();
  px=W/2; py=H-70; pCool=0; pInv=120;
  if(lives<=0){
    gameState='gameover';
    if(score>bestScore){ bestScore=score; document.getElementById('best-display').textContent=String(bestScore).padStart(6,'0'); }
    document.getElementById('ov-title').textContent='GAME OVER';
    document.getElementById('ov-wave').textContent='';
    document.getElementById('ov-label').textContent='SCORE';
    document.getElementById('ov-score').textContent=String(score).padStart(6,'0');
    document.getElementById('start-btn').textContent='▶ RESTART';
    document.getElementById('start-btn').style.display='block';
    document.getElementById('overlay').style.display='flex';
  }
}

// ── Draw ──
function draw(){
  ctx.fillStyle='#020510'; ctx.fillRect(0,0,W,H);
  for(let y=0;y<H;y+=4){ ctx.fillStyle='rgba(0,0,0,0.07)'; ctx.fillRect(0,y,W,2); }
  for(const s of stars){ ctx.globalAlpha=s.a; ctx.fillStyle='#ddeeff'; ctx.fillRect(s.x,s.y,s.size,s.size); }
  ctx.globalAlpha=1;

  for(const e of exps){
    ctx.save(); ctx.globalAlpha=(e.life/12)*0.35;
    ctx.strokeStyle=e.col; ctx.lineWidth=2; ctx.shadowColor=e.col; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.stroke(); ctx.restore();
  }
  for(const p of parts){
    ctx.save(); ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.col; ctx.shadowColor=p.col; ctx.shadowBlur=5;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz); ctx.restore();
  }
  for(const b of eBullets){
    ctx.save(); ctx.fillStyle=b.col; ctx.shadowColor=b.col; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  for(const e of enemies){ if(e.alive) drawEnemy(e); }
  for(const b of pBullets){
    ctx.save(); ctx.fillStyle='#00fff5'; ctx.shadowColor='#00fff5'; ctx.shadowBlur=10;
    ctx.fillRect(b.x-b.w/2,b.y,b.w,b.h); ctx.restore();
  }
  if(gameState==='playing'&&(pInv===0||Math.floor(pInv/6)%2===0)) drawPlayer();
}

function drawPlayer(){
  ctx.save(); ctx.translate(px,py);
  ctx.shadowColor='#00fff5'; ctx.shadowBlur=14; ctx.fillStyle='#00fff5';
  ctx.beginPath();
  ctx.moveTo(0,-PH/2); ctx.lineTo(PW*0.33,PH*0.18); ctx.lineTo(PW*0.2,PH/2);
  ctx.lineTo(-PW*0.2,PH/2); ctx.lineTo(-PW*0.33,PH*0.18); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-PW*0.33,PH*0.18); ctx.lineTo(-PW/2,PH/2); ctx.lineTo(-PW*0.15,PH*0.12); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(PW*0.33,PH*0.18);  ctx.lineTo(PW/2,PH/2);  ctx.lineTo(PW*0.15,PH*0.12); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.ellipse(0,-PH*0.05,PW*0.09,PH*0.14,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e){
  ctx.save(); ctx.translate(e.x+e.w/2,e.y+e.h/2);
  const c=e.flash>0?'#ffffff':e.col;
  ctx.shadowColor=c; ctx.shadowBlur=10+Math.sin(e.pulse)*4; ctx.fillStyle=c;
  if(e.t==='boss'){
    ctx.beginPath();
    for(let i=0;i<8;i++){ const a=(i/8)*Math.PI*2,r=e.w*0.5; i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(0,0,e.w*0.18,0,Math.PI*2); ctx.fill();
    if(e.hp<e.maxHp){
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-e.w/2,e.h/2+4,e.w,4);
      ctx.fillStyle=e.col; ctx.fillRect(-e.w/2,e.h/2+4,e.w*(e.hp/e.maxHp),4);
    }
  } else if(e.t==='medium'){
    ctx.beginPath(); ctx.moveTo(0,-e.h/2); ctx.lineTo(e.w/2,0); ctx.lineTo(0,e.h/2); ctx.lineTo(-e.w/2,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(0,0,e.w*0.14,0,Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(0,0,e.w*0.38,e.h*0.4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.shadowBlur=0;
    ctx.fillRect(-e.w*0.16,-e.h*0.1,e.w*0.1,e.h*0.13);
    ctx.fillRect(e.w*0.06,-e.h*0.1,e.w*0.1,e.h*0.13);
    ctx.strokeStyle=c; ctx.lineWidth=1.5; ctx.shadowColor=c; ctx.shadowBlur=5;
    ctx.beginPath();
    ctx.moveTo(-e.w*0.1,-e.h*0.3); ctx.lineTo(-e.w*0.22,-e.h*0.54);
    ctx.moveTo(e.w*0.1,-e.h*0.3);  ctx.lineTo(e.w*0.22,-e.h*0.54);
    ctx.stroke();
  }
  ctx.restore();
}

function refreshScore(){ document.getElementById('score-display').textContent=String(score).padStart(6,'0'); }
function refreshLives(){ [0,1,2].forEach(i=>{ document.getElementById('life'+i).classList.toggle('dead',i>=lives); }); }

function startGame(){
  score=0; lives=3; wave=1;
  px=W/2; py=H-70; pCool=0; pInv=0;
  pBullets=[]; eBullets=[]; parts=[]; exps=[];
  buildWave(wave);
  refreshScore(); refreshLives();
  document.getElementById('wave-badge').textContent='WAVE 01';
  document.getElementById('overlay').style.display='none';
  gameState='playing';
  if(!rafId) loop();
}

let lastTime = 0;
function loop(ts=0){
  const raw = ts - lastTime;
  lastTime = ts;
  const dt = Math.min(raw / (1000/60), 3);
  update(dt||1);
  draw();
  rafId=requestAnimationFrame(loop);
}
loop();
</script>
